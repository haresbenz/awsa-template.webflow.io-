<!-- SplitType is used to split text into words and letters -->
<script src="https://unpkg.com/split-type"></script>

<!-- GSAP core animation library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>

<!-- GSAP ScrollTrigger plugin (controls animations on scroll) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/ScrollTrigger.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded", (event) => {

  // -------------------------------------
  // TEXT SPLITTING SETUP
  // -------------------------------------
  // This splits any element with the [text-split] attribute
  // into individual word and character <span> elements
  // Required for all text animations to work
  let typeSplit = new SplitType("[text-split]", {
    types: "words, chars", // Change to "words" or "chars" if needed
    tagName: "span"
  });

  // -------------------------------------
  // SCROLL TRIGGER HELPER FUNCTION
  // -------------------------------------
  // This function links a GSAP timeline to scroll position
  // It resets the animation when scrolling back up
  // and plays it again when entering the viewport
  function createScrollTrigger(triggerElement, timeline) {

    // Reset animation when element scrolls out of view (backwards)
    ScrollTrigger.create({
      trigger: triggerElement,
      start: "top bottom", // Change this value to adjust reset timing
      onLeaveBack: () => {
        timeline.progress(0);
        timeline.pause();
      }
    });

    // Play animation when element enters the viewport
    ScrollTrigger.create({
      trigger: triggerElement,
      start: "top 80%", // Adjust this value to control when animation starts
      onEnter: () => timeline.play()
    });
  }

  // -------------------------------------
  // WORD-BASED ANIMATIONS
  // -------------------------------------

  // Words slide up from bottom
  $("[words-slide-up]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".word"), {
      opacity: 0,
      yPercent: 100, // Increase/decrease for stronger movement
      duration: 0.5, // Controls animation speed
      ease: "back.out(2)", // Change easing for different feel
      stagger: { amount: 0.5 } // Controls delay between words
    });
    createScrollTrigger($(this), tl);
  });

  // Words rotate in on X-axis
  $("[words-rotate-in]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.set($(this).find(".word"), {
      transformPerspective: 1000 // Controls 3D depth
    });
    tl.from($(this).find(".word"), {
      rotationX: -90, // Adjust rotation angle
      duration: 0.6,
      ease: "power2.out",
      stagger: { amount: 0.6 }
    });
    createScrollTrigger($(this), tl);
  });

  // Words slide in from the right
  $("[words-slide-from-right]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".word"), {
      opacity: 0,
      x: "1em", // Horizontal offset (increase for stronger effect)
      duration: 0.6,
      ease: "power2.out",
      stagger: { amount: 0.2 }
    });
    createScrollTrigger($(this), tl);
  });

  // -------------------------------------
  // LETTER-BASED ANIMATIONS
  // -------------------------------------

  // Letters slide up
  $("[letters-slide-up]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), {
      yPercent: 100,
      duration: 0.2,
      ease: "power1.out",
      stagger: { amount: 0.6 }
    });
    createScrollTrigger($(this), tl);
  });

  // Letters slide down
  $("[letters-slide-down]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), {
      yPercent: -120,
      duration: 0.3,
      ease: "power1.out",
      stagger: { amount: 0.7 }
    });
    createScrollTrigger($(this), tl);
  });

  // Letters fade in sequentially
  $("[letters-fade-in]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), {
      opacity: 0,
      duration: 0.2,
      ease: "power1.out",
      stagger: { amount: 0.8 }
    });
    createScrollTrigger($(this), tl);
  });

  // Letters fade in randomly
  $("[letters-fade-in-random]").each(function () {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), {
      opacity: 0,
      duration: 0.05,
      ease: "power1.out",
      stagger: {
        amount: 0.4,
        from: "random" // Random animation order
      }
    });
    createScrollTrigger($(this), tl);
  });

  // -------------------------------------
  // SCRUB ANIMATION (SCROLL-LINKED)
  // -------------------------------------
  // Words fade in progressively while scrolling
  $("[scrub-each-word]").each(function () {
    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: $(this),
        start: "top 90%", // Adjust start position
        end: "top center", // Adjust end position
        scrub: true // Links animation directly to scroll
      }
    });
    tl.from($(this).find(".word"), {
      opacity: 0.2,
      duration: 0.2,
      ease: "power1.out",
      stagger: { each: 0.4 }
    });
  });

  // -------------------------------------
  // PREVENT FLASH OF UNSTYLED TEXT
  // -------------------------------------
  // Makes text visible only after SplitType is applied
  gsap.set("[text-split]", { opacity: 1 });

});
</script>



<script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

<script>
const lenis = new Lenis({
    smooth: true,
    lerp: 0.1,
    wheelMultiplier: 1,
    infinite: false
  });
  function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
  }
  requestAnimationFrame(raf);
</script></body></html>
